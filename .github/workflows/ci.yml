name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    # A real MySQL service container for integration-level confidence,
    # separate from the mocked unit/integration tests in tests/student.test.js.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: student_registration_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Load schema into test MySQL instance
        run: mysql -h 127.0.0.1 -uroot -prootpassword < database/schema.sql

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: rootpassword
          DB_NAME: student_registration_db
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage

  docker-build-check:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend Docker image (no push)
        run: docker build -t student-registration-backend:ci ./backend
